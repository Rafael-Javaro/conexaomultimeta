name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'public/**'
      - 'next.config.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create and deploy to gh-pages
        run: |
          # Salva o diretório de build em um lugar seguro
          mkdir -p /tmp/deploy
          cp -r out/* /tmp/deploy/
          
          # Cria branch gh-pages limpa
          git checkout --orphan gh-pages
          git rm -rf .
          
          # Copia arquivos de build para root
          cp -r /tmp/deploy/* .
          echo "" > .nojekyll
          
          # Commit e push
          git add -A
          git commit -m "Deploy to GitHub Pages" || true
          git push origin gh-pages --force
