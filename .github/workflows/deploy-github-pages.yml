name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'public/**'
      - 'next.config.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create and deploy to gh-pages
        run: |
          # 1. BACKUP do build ANTES de qualquer limpeza
          mkdir -p /tmp/deploy-backup
          cp -r out/* /tmp/deploy-backup/ 2>/dev/null || exit 1
          
          # 2. Cria branch gh-pages VAZIA
          git checkout --orphan gh-pages
          
          # 3. Remove TUDO da branch nova (está vazia mesmo, mas por segurança)
          git rm -rf . 2>/dev/null || true
          
          # 4. Copia APENAS os arquivos estáticos do build
          cp -r /tmp/deploy-backup/* .
          
          # 5. Cria .nojekyll (impede Jekyll processing no GitHub)
          touch .nojekyll
          
          # 6. Add, commit e push
          git add -A
          git commit -m "Deploy to GitHub Pages" || true
          git push origin gh-pages --force
