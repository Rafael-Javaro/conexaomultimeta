name: Auto Product Changelog & Notifications

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - '!**/*.css'
      - '!**/*.md'

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Extrair diff do commit
      - name: Get git diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD)
          DIFF_ESCAPED=$(echo "$DIFF" | jq -Rs .)
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT
          
          FILES=$(git diff HEAD~1 HEAD --name-only | tr '\n' ', ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      # 2. Analisar com Claude (opcional)
      - name: Analyze with Claude Haiku 4.5
        id: analysis
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          HAS_CLAUDE: ${{ secrets.CLAUDE_API_KEY != '' }}
        if: env.HAS_CLAUDE == 'true'
        run: |
          ANALYSIS=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "claude-3-5-haiku-20241022",
              "max_tokens": 1024,
              "messages": [{
                "role": "user",
                "content": "Analise essas mudanças de código e extraia informações operacionais.\n\nArquivos alterados:\n${{ steps.diff.outputs.files }}\n\nMensagem do commit:\n${{ steps.diff.outputs.commit_msg }}\n\nRetorne um JSON com esta estrutura:\n{\"type\": \"feature|fix|breaking|refactor|docs\", \"impacts\": \"expert|closer|admin|all\", \"summary\": \"uma linha\", \"description\": \"2-3 frases\", \"actions\": \"ação específica\", \"urgency\": \"low|medium|high\"}"
              }]
            }')
          
          RESULT=$(echo "$ANALYSIS" | jq -r '.content[0].text')
          
          TYPE=$(echo "$RESULT" | jq -r '.type // "feature"')
          IMPACTS=$(echo "$RESULT" | jq -r '.impacts // "all"')
          SUMMARY=$(echo "$RESULT" | jq -r '.summary // "Mudança de código"')
          DESCRIPTION=$(echo "$RESULT" | jq -r '.description // "Mudança realizada"')
          ACTIONS=$(echo "$RESULT" | jq -r '.actions // "Revisar commit"')
          URGENCY=$(echo "$RESULT" | jq -r '.urgency // "medium"')
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "impacts=$IMPACTS" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "actions=$ACTIONS" >> $GITHUB_OUTPUT
          echo "urgency=$URGENCY" >> $GITHUB_OUTPUT

      # 2B. Fallback se Claude não disponível
      - name: Default Analysis Fallback
        id: analysis_fallback
        env:
          HAS_CLAUDE: ${{ secrets.CLAUDE_API_KEY != '' }}
        if: env.HAS_CLAUDE != 'true' || failure()
        run: |
          COMMIT_MSG="${{ steps.diff.outputs.commit_msg }}"
          
          if [[ "$COMMIT_MSG" =~ ^feat ]]; then
            TYPE="feature"
          elif [[ "$COMMIT_MSG" =~ ^fix ]]; then
            TYPE="fix"
          elif [[ "$COMMIT_MSG" =~ ^BREAKING ]]; then
            TYPE="breaking"
          elif [[ "$COMMIT_MSG" =~ ^refactor ]]; then
            TYPE="refactor"
          else
            TYPE="docs"
          fi
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "impacts=all" >> $GITHUB_OUTPUT
          echo "summary=Mudança: $TYPE" >> $GITHUB_OUTPUT
          echo "description=Arquivos alterados: ${{ steps.diff.outputs.files }}" >> $GITHUB_OUTPUT
          echo "actions=Revisar mudança" >> $GITHUB_OUTPUT
          echo "urgency=medium" >> $GITHUB_OUTPUT

      # 3. Usar análise do Claude ou fallback
      - name: Set final analysis
        id: final_analysis
        run: |
          if [ -n "${{ steps.analysis.outputs.type }}" ]; then
            echo "type=${{ steps.analysis.outputs.type }}" >> $GITHUB_OUTPUT
            echo "impacts=${{ steps.analysis.outputs.impacts }}" >> $GITHUB_OUTPUT
            echo "summary=${{ steps.analysis.outputs.summary }}" >> $GITHUB_OUTPUT
            echo "description=${{ steps.analysis.outputs.description }}" >> $GITHUB_OUTPUT
            echo "actions=${{ steps.analysis.outputs.actions }}" >> $GITHUB_OUTPUT
            echo "urgency=${{ steps.analysis.outputs.urgency }}" >> $GITHUB_OUTPUT
          else
            echo "type=${{ steps.analysis_fallback.outputs.type }}" >> $GITHUB_OUTPUT
            echo "impacts=${{ steps.analysis_fallback.outputs.impacts }}" >> $GITHUB_OUTPUT
            echo "summary=${{ steps.analysis_fallback.outputs.summary }}" >> $GITHUB_OUTPUT
            echo "description=${{ steps.analysis_fallback.outputs.description }}" >> $GITHUB_OUTPUT
            echo "actions=${{ steps.analysis_fallback.outputs.actions }}" >> $GITHUB_OUTPUT
            echo "urgency=${{ steps.analysis_fallback.outputs.urgency }}" >> $GITHUB_OUTPUT
          fi

      # 4. Enviar Email (se RESEND_API_KEY existir)
      - name: Send notification email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HAS_RESEND: ${{ secrets.RESEND_API_KEY != '' }}
        if: env.HAS_RESEND == 'true'
        run: |
          curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"product-updates@multimeta.com\",
              \"to\": [\"rafaeljavaro750@gmail.com\", \"brunoferraric@gmail.com\"],
              \"subject\": \"🚀 Mudança no produto: ${{ steps.final_analysis.outputs.summary }}\",
              \"html\": \"<h2>Mudança no produto detectada</h2><p><strong>Tipo:</strong> ${{ steps.final_analysis.outputs.type }}</p><p><strong>Impacto:</strong> ${{ steps.final_analysis.outputs.impacts }}</p><p><strong>Urgência:</strong> ${{ steps.final_analysis.outputs.urgency }}</p><h3>Resumo</h3><p>${{ steps.final_analysis.outputs.summary }}</p><h3>Descrição</h3><p>${{ steps.final_analysis.outputs.description }}</p><h3>Ação Recomendada</h3><p>${{ steps.final_analysis.outputs.actions }}</p><h3>Arquivos Alterados</h3><pre>${{ steps.diff.outputs.files }}</pre><p><a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>Ver commit completo</a></p>\"
            }" || echo "Email send failed, continuing..."

      # 5. Slack (se webhook existir)
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HAS_SLACK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        if: env.HAS_SLACK == 'true'
        run: |
          COLOR="#00AA00"
          if [ "${{ steps.final_analysis.outputs.urgency }}" = "high" ]; then
            COLOR="#FF0000"
          elif [ "${{ steps.final_analysis.outputs.urgency }}" = "medium" ]; then
            COLOR="#FFA500"
          fi
          
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "channel": "#product-updates",
              "username": "Product Bot",
              "icon_emoji": ":rocket:",
              "attachments": [
                {
                  "color": "'$COLOR'",
                  "title": "${{ steps.final_analysis.outputs.summary }}",
                  "text": "${{ steps.final_analysis.outputs.description }}\n\n💡 *Ação:* ${{ steps.final_analysis.outputs.actions }}",
                  "fields": [
                    {"title": "Tipo", "value": "${{ steps.final_analysis.outputs.type }}", "short": true},
                    {"title": "Impacto", "value": "${{ steps.final_analysis.outputs.impacts }}", "short": true},
                    {"title": "Urgência", "value": "${{ steps.final_analysis.outputs.urgency }}", "short": true},
                    {"title": "Arquivos", "value": "${{ steps.diff.outputs.files }}", "short": false}
                  ],
                  "footer": "MultiMeta Product Automation"
                }
              ]
            }' || echo "Slack notification failed, continuing..."

      # 6. Supabase (se URL existir)
      - name: Save to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HAS_SUPABASE: ${{ secrets.SUPABASE_URL != '' }}
        if: env.HAS_SUPABASE == 'true'
        run: |
          curl -X POST "$SUPABASE_URL/rest/v1/product_changes" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "commit_url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}",
              "change_type": "${{ steps.final_analysis.outputs.type }}",
              "impacts": "${{ steps.final_analysis.outputs.impacts }}",
              "summary": "${{ steps.final_analysis.outputs.summary }}",
              "description": "${{ steps.final_analysis.outputs.description }}",
              "recommended_action": "${{ steps.final_analysis.outputs.actions }}",
              "urgency": "${{ steps.final_analysis.outputs.urgency }}",
              "files_changed": "${{ steps.diff.outputs.files }}",
              "deployed_at": "now()"
            }' || echo "Supabase insert failed, continuing..."
