name: Auto Product Changelog & Notifications

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - '!**/*.css'
      - '!**/*.md'

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Extrair diff do commit
      - name: Get git diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD)
          # Escape para JSON
          DIFF_ESCAPED=$(echo "$DIFF" | jq -Rs .)
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT
          
          # Também pegar arquivos alterados
          FILES=$(git diff HEAD~1 HEAD --name-only | tr '\n' ', ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          
          # Commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      # 2. Analisar com Claude Haiku 4.5
      - name: Analyze with Claude Haiku 4.5
        id: analysis
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          ANALYSIS=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "claude-3-5-haiku-20241022",
              "max_tokens": 1024,
              "messages": [{
                "role": "user",
                "content": "Você é um especialista em análise de mudanças de produto. Analise essas mudanças de código e extraia informações operacionais.\n\nArquivos alterados:\n${{ steps.diff.outputs.files }}\n\nDiff:\n${{ steps.diff.outputs.diff }}\n\nMensagem do commit:\n${{ steps.diff.outputs.commit_msg }}\n\nRetorne um JSON VÁLIDO (sem markdown, sem blocos de código) com EXATAMENTE esta estrutura:\n{\n  \"type\": \"feature|fix|breaking|refactor|docs\",\n  \"impacts\": \"expert|closer|admin|all\",\n  \"summary\": \"uma linha descrevendo a mudança\",\n  \"description\": \"2-3 frases explicando o que mudou e por quê\",\n  \"actions\": \"uma ação específica que CS/comercial precisa tomar\",\n  \"urgency\": \"low|medium|high\"\n}"
              }]
            }')
          
          # Extract content
          RESULT=$(echo "$ANALYSIS" | jq -r '.content[0].text')
          
          # Parse JSON response
          TYPE=$(echo "$RESULT" | jq -r '.type')
          IMPACTS=$(echo "$RESULT" | jq -r '.impacts')
          SUMMARY=$(echo "$RESULT" | jq -r '.summary')
          DESCRIPTION=$(echo "$RESULT" | jq -r '.description')
          ACTIONS=$(echo "$RESULT" | jq -r '.actions')
          URGENCY=$(echo "$RESULT" | jq -r '.urgency')
          
          # Export to GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "impacts=$IMPACTS" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "actions=$ACTIONS" >> $GITHUB_OUTPUT
          echo "urgency=$URGENCY" >> $GITHUB_OUTPUT

      # 3. Salvar em Supabase
      - name: Save to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -X POST "$SUPABASE_URL/rest/v1/product_changes" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "commit_url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}",
              "change_type": "${{ steps.analysis.outputs.type }}",
              "impacts": "${{ steps.analysis.outputs.impacts }}",
              "summary": "${{ steps.analysis.outputs.summary }}",
              "description": "${{ steps.analysis.outputs.description }}",
              "recommended_action": "${{ steps.analysis.outputs.actions }}",
              "urgency": "${{ steps.analysis.outputs.urgency }}",
              "files_changed": "${{ steps.diff.outputs.files }}",
              "deployed_at": "now()"
            }' || echo "Supabase insert failed, continuing..."

      # 4. Enviar Email com Resend
      - name: Send notification email
        id: email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          EMAILS='["rafaeljavaro750@gmail.com","brunoferraric@gmail.com"'
          
          EMAIL_BODY="Mudança no produto detectada:\n\nTipo: ${{ steps.analysis.outputs.type }}\nImpacto: ${{ steps.analysis.outputs.impacts }}\nUrgência: ${{ steps.analysis.outputs.urgency }}\n\nResumo:\n${{ steps.analysis.outputs.summary }}\n\nDescrição:\n${{ steps.analysis.outputs.description }}\n\nAção recomendada:\n${{ steps.analysis.outputs.actions }}\n\nArquivos alterados:\n${{ steps.diff.outputs.files }}\n\nCommit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          
          curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"product-updates@multimeta.com\",
              \"to\": $EMAILS,
              \"subject\": \"🚀 Mudança no produto: ${{ steps.analysis.outputs.summary }}\",
              \"html\": \"<h2>Mudança no produto detectada</h2><p><strong>Tipo:</strong> ${{ steps.analysis.outputs.type }}</p><p><strong>Impacto:</strong> ${{ steps.analysis.outputs.impacts }}</p><p><strong>Urgência:</strong> ${{ steps.analysis.outputs.urgency }}</p><h3>Resumo</h3><p>${{ steps.analysis.outputs.summary }}</p><h3>Descrição</h3><p>${{ steps.analysis.outputs.description }}</p><h3>Ação Recomendada</h3><p>${{ steps.analysis.outputs.actions }}</p><h3>Arquivos Alterados</h3><pre>${{ steps.diff.outputs.files }}</pre><p><a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>Ver commit completo</a></p>\"
            }" || echo "Email send failed, continuing..."

      # 5. Postar no Slack via Webhook
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          COLOR="#00AA00"
          if [ "${{ steps.analysis.outputs.urgency }}" = "high" ]; then
            COLOR="#FF0000"
          elif [ "${{ steps.analysis.outputs.urgency }}" = "medium" ]; then
            COLOR="#FFA500"
          fi
          
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "channel": "#product-updates",
              "username": "Product Bot",
              "icon_emoji": ":rocket:",
              "attachments": [
                {
                  "color": "'$COLOR'",
                  "title": "${{ steps.analysis.outputs.summary }}",
                  "text": "${{ steps.analysis.outputs.description }}\n\n💡 *Ação:* ${{ steps.analysis.outputs.actions }}",
                  "fields": [
                    {
                      "title": "Tipo",
                      "value": "${{ steps.analysis.outputs.type }}",
                      "short": true
                    },
                    {
                      "title": "Impacto",
                      "value": "${{ steps.analysis.outputs.impacts }}",
                      "short": true
                    },
                    {
                      "title": "Urgência",
                      "value": "${{ steps.analysis.outputs.urgency }}",
                      "short": true
                    },
                    {
                      "title": "Arquivos",
                      "value": "${{ steps.diff.outputs.files }}",
                      "short": false
                    }
                  ],
                  "footer": "MultiMeta Product Automation",
                  "ts": '$(date +%s)'
                }
              ]
            }' || echo "Slack notification failed, continuing..."
        if: always()
